name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev \
            python3-gi \
            python3-pytest

      - name: Build
        run: meson setup build -Ddocs=false && ninja -C build

      - name: C tests
        run: meson test -C build --print-errorlogs

      - name: Python tests
        run: |
          GI_TYPELIB_PATH=build/src LD_LIBRARY_PATH=build/src \
            python3 -m pytest bindings/python/tests/ -v

      - name: Build source distribution
        run: |
          python3 -m pip install build meson-python
          python3 -m build --sdist

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: gsni-1.0.2
          path: dist/*.tar.gz

  rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y rpm-build

      - name: Install build dependencies from spec
        run: |
          dnf install -y dnf-plugins-core
          dnf builddep -y packaging/libgsni.spec

      - name: Create source tarball
        run: |
          VERSION=1.0.2
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          tar czf ~/rpmbuild/SOURCES/gsni-${VERSION}.tar.gz \
            --transform "s|^\\.|gsni-${VERSION}|" \
            --exclude='.git' --exclude='build' .
          echo "Tarball size: $(stat -c%s ~/rpmbuild/SOURCES/gsni-${VERSION}.tar.gz) bytes"
          tar tzf ~/rpmbuild/SOURCES/gsni-${VERSION}.tar.gz | head -5

      - name: Build RPM
        run: |
          cp packaging/libgsni.spec ~/rpmbuild/SPECS/
          rpmbuild -ba ~/rpmbuild/SPECS/libgsni.spec

      - name: Show RPM contents
        run: find ~/rpmbuild/RPMS ~/rpmbuild/SRPMS -name '*.rpm' -exec basename {} \;

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deb tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts debhelper \
            meson libglib2.0-dev libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev python3-dev

      - name: Set up debian directory
        run: cp -a packaging/debian debian

      - name: Create changelog
        run: |
          echo "libgsni (1.0.2-1) unstable; urgency=medium" > debian/changelog
          echo "  * Release 1.0.2" >> debian/changelog
          echo " -- Jaroslav Reznik <jreznik@redhat.com>  $(date -R)" >> debian/changelog

      - name: Build DEB
        run: dpkg-buildpackage -us -uc -b

      - name: Show DEB contents
        run: ls -la /home/runner/work/gsni/*.deb
