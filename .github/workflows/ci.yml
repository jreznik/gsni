name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev \
            python3-gi \
            gi-docgen \
            python3-pytest

      - name: Build
        run: meson setup build -Ddocs=false && ninja -C build

      - name: C tests
        run: meson test -C build --print-errorlogs

      - name: Python tests
        run: |
          GI_TYPELIB_PATH=build/src LD_LIBRARY_PATH=build/src \
            python3 -m pytest bindings/python/tests/ -v

      - name: Python wheel build
        run: python3 -m pip install build && python3 -m build --wheel

  rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm rsync

      - name: Create source tarball
        run: |
          VERSION=1.0.0
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          git archive --format=tar --prefix=gsni-${VERSION}/ HEAD | xz > ~/rpmbuild/SOURCES/gsni-${VERSION}.tar.xz

      - name: Install RPM build dependencies
        run: |
          sudo apt-get install -y \
            meson ninja-build \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev \
            python3-dev

      - name: Build RPM
        run: |
          cp packaging/libgsni.spec ~/rpmbuild/SPECS/
          rpmbuild -ba --nodeps ~/rpmbuild/SPECS/libgsni.spec

      - name: Show RPM contents
        run: |
          echo "=== Built RPMs ==="
          find ~/rpmbuild/RPMS ~/rpmbuild/SRPMS -name '*.rpm' -exec basename {} \;

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deb tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts debhelper dh-make meson \
            libglib2.0-dev libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev python3-dev

      - name: Create debian packaging
        run: |
          VERSION=1.0.0
          mkdir -p debian
          cat > debian/control << 'EOFCTL'
      Source: libgsni
      Section: libs
      Priority: optional
      Maintainer: Jaroslav Reznik <jreznik@redhat.com>
      Build-Depends: debhelper-compat (= 13), meson (>= 1.0),
       libglib2.0-dev (>= 2.80), libgdk-pixbuf-2.0-dev (>= 2.42),
       libgirepository1.0-dev (>= 1.78), python3-dev
      Standards-Version: 4.6.2
      Homepage: https://github.com/jreznik/gsni

      Package: libgsni1
      Architecture: any
      Depends: ${shlibs:Depends}, ${misc:Depends}
      Description: StatusNotifierItem D-Bus tray icon library (runtime)

      Package: libgsni-dev
      Architecture: any
      Section: libdevel
      Depends: libgsni1 (= ${binary:Version}), ${misc:Depends}
      Description: StatusNotifierItem D-Bus tray icon library (development)

      Package: gir1.2-gsni-1.0
      Architecture: any
      Depends: libgsni1 (= ${binary:Version}), ${misc:Depends}
      Description: GObject Introspection data for libgsni

      Package: python3-gsni
      Architecture: all
      Depends: gir1.2-gsni-1.0 (= ${binary:Version}), ${misc:Depends},
       python3-gi
      Description: Python bindings for libgsni
      EOFCTL

          cat > debian/rules << 'EOFRUL'
      #!/usr/bin/make -f
      %:
      	dh $@ --buildsystem=meson

      override_dh_auto_configure:
      	dh_auto_configure -- -Ddocs=false -Dtests=false
      EOFRUL
          chmod +x debian/rules

          echo 13 > debian/compat
          echo "3.0 (quilt)" > debian/source/format

          cat > debian/libgsni1.install << 'EOFINS'
      usr/lib/*/libgsni.so.*
      EOFINS
          cat > debian/libgsni-dev.install << 'EOFINS'
      usr/include/gsni/
      usr/lib/*/libgsni.so
      usr/lib/*/pkgconfig/gsni.pc
      usr/share/gir-1.0/Gsni-*.gir
      EOFINS
          cat > debian/gir1.2-gsni-1.0.install << 'EOFINS'
      usr/lib/*/girepository-1.0/Gsni-*.typelib
      EOFINS
          cat > debian/python3-gsni.install << 'EOFINS'
      usr/lib/python3*/dist-packages/gsni/
      EOFINS

          echo "gsni (${VERSION}-1) unstable; urgency=medium" > debian/changelog
          echo "  * Initial release" >> debian/changelog
          echo " -- Jaroslav Reznik <jreznik@redhat.com>  $(date -R)" >> debian/changelog

      - name: Build DEB
        run: dpkg-buildpackage -us -uc -b 2>&1 | tail -20

      - name: Show DEB contents
        run: ls -la ../*.deb 2>/dev/null || true
