name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev \
            python3-gi \
            python3-pytest

      - name: Build
        run: meson setup build -Ddocs=false && ninja -C build

      - name: C tests
        run: meson test -C build --print-errorlogs

      - name: Python tests
        run: |
          GI_TYPELIB_PATH=build/src LD_LIBRARY_PATH=build/src \
            python3 -m pytest bindings/python/tests/ -v

      - name: Build Python wheel
        run: |
          python3 -m pip install build
          python3 -m build --wheel

  rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM build tools
        run: |
          dnf install -y \
            rpm-build rpmdevtools meson gcc \
            glib2-devel gdk-pixbuf2-devel \
            gobject-introspection-devel \
            python3-devel git

      - name: Create source tarball
        run: |
          VERSION=1.0.0
          mkdir -p ~/rpmbuild/{SOURCES,SPECS}
          git archive --format=tar --prefix=gsni-${VERSION}/ HEAD \
            | xz > ~/rpmbuild/SOURCES/gsni-${VERSION}.tar.xz

      - name: Build RPM
        run: |
          cp packaging/libgsni.spec ~/rpmbuild/SPECS/
          rpmbuild -ba ~/rpmbuild/SPECS/libgsni.spec

      - name: Show RPM contents
        run: find ~/rpmbuild/RPMS ~/rpmbuild/SRPMS -name '*.rpm' -exec basename {} \;

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deb tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            devscripts debhelper \
            meson libglib2.0-dev libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev python3-dev

      - name: Set up debian directory
        run: cp -a packaging/debian debian

      - name: Create changelog
        run: |
          echo "libgsni (1.0.0-1) unstable; urgency=medium" > debian/changelog
          echo "  * Initial release" >> debian/changelog
          echo " -- Jaroslav Reznik <jreznik@redhat.com>  $(date -R)" >> debian/changelog

      - name: Build DEB
        run: dpkg-buildpackage -us -uc -b 2>&1 | tail -20

      - name: Show DEB contents
        run: ls -la ../*.deb
