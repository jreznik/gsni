name: Build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev \
            meson \
            ninja-build \
            patchelf

      - name: Build C library
        run: |
          meson setup build -Dprefix=/usr -Dtests=false -Dexamples=false -Ddocs=false
          ninja -C build

      - name: Build Python wheel
        run: |
          python3 -m pip install build
          python3 -m build --wheel

      - name: Bundle shared library with auditwheel
        run: |
          python3 -m pip install auditwheel
          auditwheel repair dist/gsni-*.whl \
            --plat manylinux_2_28_x86_64 \
            -w wheelhouse/

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl
