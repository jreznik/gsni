name: Build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev \
            meson \
            ninja-build

      - name: Build wheel with meson-python
        run: |
          python3 -m pip install build meson-python
          python3 -m build --wheel

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl
