name: Build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheel (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [auto64]

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgirepository1.0-dev \
            meson \
            ninja-build \
            patchelf

      - name: Build C library
        run: |
          meson setup build -Dprefix=/usr -Dtests=false -Dexamples=false -Ddocs=false
          ninja -C build
          # Copy built artifacts for auditwheel
          mkdir -p wheel-build/usr/lib/ wheel-build/usr/share/
          cp build/src/libgsni.so* wheel-build/usr/lib/
          cp build/src/Gsni-*.typelib wheel-build/usr/lib/girepository-1.0/ 2>/dev/null || true
          cp build/src/Gsni-*.gir wheel-build/usr/share/gir-1.0/ 2>/dev/null || true

      - name: Build Python wheel
        run: |
          python3 -m pip install build
          cd bindings/python
          python3 -m build --wheel

      - name: Bundle shared library with auditwheel
        run: |
          python3 -m pip install auditwheel
          auditwheel repair bindings/python/dist/gsni-*.whl \
            --plat manylinux_2_28_x86_64 \
            -w wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    needs: build_wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheelhouse
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
